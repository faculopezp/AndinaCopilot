name: Actualizar AndinaCopilot

on:
  schedule:
    - cron: "0 12 1,15 * *"   # días 1 y 15 de cada mes, 12:00 UTC
  workflow_dispatch:           # correrlo a mano desde Actions

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ingesta de informes nuevos
        run: python scripts/ingest.py --pais all

      - name: Commitear cambios si hay datos nuevos
        run: |
          git config user.name "andina-bot"
          git config user.email "bot@andinacopilot.local"
          git add data/ dashboard/
          git diff --staged --quiet || git commit -m "chore: actualización automática $(date +%Y-%m-%d)"
          git push
