# Automatización quincenal (ESQUELETO — versión final)
# Revisa si salieron informes nuevos, regenera el dashboard y commitea los cambios.
# Cuando el scraper de Chile/Ecuador esté listo, se agrega el paso de ingesta antes de build.
name: Actualizar AndinaCopilot

on:
  schedule:
    - cron: "0 12 1,15 * *"   # los días 1 y 15 de cada mes, 12:00 UTC (quincenal)
  workflow_dispatch:           # permite correrlo a mano desde la pestaña Actions

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # - name: Ingesta de informes nuevos (TODO: scraper sobre scripts/sources.py)
      #   run: python scripts/ingest.py

      - name: Regenerar dashboard
        run: python scripts/build_dashboard.py

      - name: Commitear cambios si hay datos nuevos
        run: |
          git config user.name "andina-bot"
          git config user.email "bot@andinacopilot.local"
          git add -A
          git diff --staged --quiet || git commit -m "chore: actualización quincenal automática"
          git push
