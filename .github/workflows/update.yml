name: Actualizar AndinaCopilot

on:
  schedule:
    - cron: "0 12 1,15 * *"   # días 1 y 15 de cada mes, 12:00 UTC
  workflow_dispatch:
    inputs:
      pais:
        description: "País a procesar (all / chile / peru / ecuador)"
        required: false
        default: "all"
      backfill:
        description: "Backfill completo (true/false)"
        required: false
        default: "false"

permissions:
  contents: write      # para commitear datos actualizados

jobs:
  ingestar:
    runs-on: ubuntu-latest
    outputs:
      hay_cambios: ${{ steps.check.outputs.hay_cambios }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ingesta de informes nuevos
        run: |
          PAIS="${{ github.event.inputs.pais || 'all' }}"
          BACKFILL="${{ github.event.inputs.backfill || 'false' }}"
          ARGS="--pais $PAIS"
          [ "$BACKFILL" = "true" ] && ARGS="$ARGS --backfill"
          python scripts/ingest.py $ARGS
        continue-on-error: true   # si una fuente falla, el resto igual corre

      - name: Regenerar dashboard y Excel
        run: |
          python scripts/build_dashboard.py
          python scripts/build_excel.py

      - name: Verificar si hay cambios
        id: check
        run: |
          git add data/ dashboard/ Base_Andina_Ventas_Auto.xlsx
          if git diff --staged --quiet; then
            echo "hay_cambios=false" >> $GITHUB_OUTPUT
            echo "Sin datos nuevos."
          else
            echo "hay_cambios=true" >> $GITHUB_OUTPUT
            echo "Hay datos nuevos para commitear."
          fi

      - name: Commitear datos actualizados
        if: steps.check.outputs.hay_cambios == 'true'
        run: |
          git config user.name "andina-bot"
          git config user.email "bot@andinacopilot.local"
          git commit -m "chore: actualización automática $(date +%Y-%m-%d)"
          git push

      - name: Asegurar reporte (fallback si la ingesta murió antes)
        if: always()
        run: |
          if [ ! -f run_report.txt ]; then
            echo "AndinaCopilot - la corrida FALLÓ antes de generar el reporte." > run_report.txt
            echo "Revisar los logs del workflow en GitHub Actions." >> run_report.txt
          fi

      - name: Enviar email resumen
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "AndinaCopilot — actualización de datos"
          to: facundolopezparadiso@gmail.com
          from: AndinaCopilot Bot <${{ secrets.MAIL_USERNAME }}>
          body: file://run_report.txt

  # Vercel se auto-deploya al detectar el push que hace el job "ingestar"
  # No hace falta un job separado de deploy.
